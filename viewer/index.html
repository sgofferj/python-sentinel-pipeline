<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satelliittikuvat (OpenLayers Edition)</title>
    <!-- OpenLayers CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.3.1/ol.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    </head>

<body>
    <div id="map"></div>
    
    <div id="logo-container">
        <img src="logo.png" alt="Logo">
    </div>

    <div id="legend-panel" class="map-overlay">
        <!-- Legend content will appear here -->
    </div>

    <div id="sidebar">
        <div class="header">
            <h1>Satelliittikuvat</h1>
            <p>Valitse kartalle päällekkäin asetettavat tasot.</p>
            <div class="action-row">
                <button id="deselect-all" class="deselect-btn" title="Poista kaikki valinnat">Tyhjennä</button>
                <button id="zoom-available" class="action-btn" title="Näytä kaikki">Zoom</button>
                <button id="identify-optical" class="toggle-btn" title="Näytä optiset alueet">Optinen</button>
                <button id="identify-radar" class="toggle-btn" title="Näytä tutka-alueet">Tutka</button>
            </div>
        </div>
        <div id="base-picker" class="base-area">
            <!-- Baselayer toggles will appear here -->
        </div>
        <div id="layer-picker" class="scroll-area">
            <div id="loading">
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <p id="loading-text">Ladataan inventaariota...</p>
            </div>
        </div>
    </div>

    <div id="map-spinner">
        <div class="spinner"></div>
    </div>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/geotiff"></script>
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.3.1/dist/ol.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
